name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: local verification gate
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-shadow/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Python test dependencies
        run: python -m pip install -r requirements.txt

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare Go embedded frontend
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force go-shadow/web/dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force go-shadow/web/dist | Out-Null
          Copy-Item -Path frontend/dist/* -Destination go-shadow/web/dist -Recurse -Force

      - name: Run Loop verification gate
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .loop/verify-gate.ps1
