<!-- Context Menus Component (v0.9.0) -->
      <!-- Tag Context Menu -->
      <div
        v-if="tagContextMenu.visible"
        class="fixed z-[100] bg-theme-elevated border border-theme-default rounded-lg shadow-xl py-1 min-w-[140px] animate-in fade-in zoom-in-95 duration-150"
        :style="{ top: tagContextMenu.y + 'px', left: tagContextMenu.x + 'px' }"
        @click.stop
      >
        <button
          @click="openTagRenameModal"
          class="w-full px-4 py-2 text-sm text-left text-theme-secondary hover:bg-theme-hover hover:text-white flex items-center gap-2"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
            ></path>
          </svg>
          {{ t('tags.rename', '重新命名') }}
        </button>
        <button
          @click="openTagMergeModal"
          class="w-full px-4 py-2 text-sm text-left text-gray-300 hover:bg-gray-700 hover:text-white flex items-center gap-2"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
            ></path>
          </svg>
          {{ t('tags.mergeTo', '合併至其他標籤') }}
        </button>
        <div class="border-t border-theme-default my-1"></div>
        <button
          @click="deleteTag"
          class="w-full px-4 py-2 text-sm text-left text-red-400 hover:bg-red-900/30 hover:text-red-300 flex items-center gap-2"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
            ></path>
          </svg>
          {{ t('tags.delete', '刪除標籤') }}
        </button>
      </div>

      <!-- Tag Rename Modal -->
      <div
        v-if="tagRenameModal.visible"
        class="fixed inset-0 z-[101] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm"
        @click.self="closeTagModals"
      >
        <div
          class="bg-theme-surface rounded-xl border border-theme-default w-full max-w-sm p-6 animate-in fade-in zoom-in-95 duration-200"
        >
          <h3 class="text-lg font-bold text-theme-primary mb-4">{{ t('tags.renameTitle', '重新命名標籤') }}</h3>
          <div class="mb-4">
            <label class="block text-sm text-theme-secondary mb-2">{{ t('tags.newName', '新名稱') }}</label>
            <input
              v-model="tagRenameModal.newName"
              type="text"
              class="w-full bg-theme-elevated border border-theme-default rounded-lg px-4 py-2 text-theme-primary focus:outline-none focus:border-theme-primary"
              :placeholder="tagContextMenu.tag?.name"
              @keyup.enter="confirmRenameTag"
            />
          </div>
          <div class="flex justify-end gap-2">
            <button
              @click="closeTagModals"
              class="px-4 py-2 text-sm text-theme-secondary hover:text-white transition-colors"
            >
              {{ t('common.cancel') }}
            </button>
            <button
              @click="confirmRenameTag"
              :disabled="!tagRenameModal.newName.trim() || tagRenameModal.loading"
              class="px-4 py-2 text-sm bg-theme-primary hover:bg-theme-primary-hover text-white rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
              {{ tagRenameModal.loading ? t('common.saving') : t('common.confirm') }}
            </button>
          </div>
        </div>
      </div>

      <!-- Tag Merge Modal -->
      <div
        v-if="tagMergeModal.visible"
        class="fixed inset-0 z-[101] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm"
        @click.self="closeTagModals"
      >
        <div
          class="bg-theme-surface rounded-xl border border-theme-default w-full max-w-sm p-6 animate-in fade-in zoom-in-95 duration-200"
        >
          <h3 class="text-lg font-bold text-theme-primary mb-4">{{ t('tags.mergeTitle', '合併標籤') }}</h3>
          <p class="text-sm text-theme-secondary mb-4">
            {{ t('tags.mergeFrom', '將') }}
            <span class="text-theme-accent-light font-medium"
              >#{{ tagContextMenu.tag?.name }}</span
            >
            {{ t('tags.mergeToLabel', '合併至：') }}
          </p>
          <div class="mb-4 max-h-48 overflow-y-auto space-y-1">
            <button
              v-for="t in tags.filter(t => t.id !== tagContextMenu.tag?.id)"
              :key="t.id"
              @click="tagMergeModal.targetId = t.id"
              class="w-full px-3 py-2 text-left text-sm rounded-lg transition-colors"
              :class="tagMergeModal.targetId === t.id 
                ? 'bg-blue-600 text-white' 
                : 'bg-theme-elevated text-theme-secondary hover:bg-theme-hover'"
            >
              #{{ t.name }} <span class="text-theme-muted">({{ t.count }})</span>
            </button>
          </div>
          <div class="flex justify-end gap-2">
            <button
              @click="closeTagModals"
              class="px-4 py-2 text-sm text-theme-secondary hover:text-white transition-colors"
            >
              {{ t('common.cancel') }}
            </button>
            <button
              @click="confirmMergeTag"
              :disabled="!tagMergeModal.targetId || tagMergeModal.loading"
              class="px-4 py-2 text-sm bg-theme-primary hover:bg-theme-primary-hover text-white rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
              {{ tagMergeModal.loading ? t('tags.merging', '合併中...') : t('tags.confirmMerge', '確認合併') }}
            </button>
          </div>
        </div>
      </div>
