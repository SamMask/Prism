{# Header Section #}
<!-- Prompt Builder Header (v0.9.0) -->
<header
  class="bg-theme-surface/80 backdrop-blur-xl border-b border-theme-subtle sticky top-0 z-40"
>
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo & Title -->
    <div class="flex items-center gap-4">
      <a href="/" class="flex items-center gap-3 text-theme-secondary hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        <span class="text-sm">{{ t('nav.backToHome', '返回首頁') }}</span>
      </a>
      <div class="w-px h-6 bg-theme-default"></div>
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-[var(--color-accent)] to-pink-500 rounded-xl flex items-center justify-center shadow-lg shadow-[rgba(var(--color-accent-rgb),0.2)]">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold bg-gradient-to-r from-[var(--color-accent)] to-pink-400 bg-clip-text text-transparent">
            Prompt Builder
          </h1>
          <p class="text-xs text-theme-muted">{{ t('promptBuilder.subtitle', '結構化提示詞組裝器 v1.0') }}</p>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3">
      <!-- Language Switcher -->
      <div class="relative">
        <button
          @click="langDropdownOpen = !langDropdownOpen"
          class="flex items-center gap-2 px-3 py-2 text-sm text-theme-secondary hover:text-white bg-theme-elevated hover:bg-theme-hover rounded-lg transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path>
          </svg>
          {{ currentLocale === 'zh-TW' ? '中' : 'EN' }}
        </button>
        <div
          v-if="langDropdownOpen"
          @click="langDropdownOpen = false"
          class="absolute right-0 mt-2 w-36 bg-theme-elevated border border-theme-default rounded-lg shadow-xl z-50 overflow-hidden"
        >
          <button
            v-for="locale in availableLocales"
            :key="locale.code"
            @click="setLocale(locale.code)"
            class="w-full px-4 py-2 text-sm text-left hover:bg-theme-hover transition-colors"
            :class="currentLocale === locale.code ? 'text-theme-accent-light bg-theme-hover/50' : 'text-theme-secondary'"
          >
            {{ locale.name }}
          </button>
        </div>
      </div>
      <button
        @click="resetForm"
        class="px-4 py-2 text-sm font-medium text-theme-secondary hover:text-white bg-theme-elevated hover:bg-theme-hover rounded-lg transition-colors flex items-center gap-2"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        {{ t('common.reset', '重置') }}
      </button>
      <button
        @click="copyOutput"
        class="px-4 py-2 text-sm font-medium text-white bg-theme-accent hover:bg-theme-accent-hover rounded-lg transition-colors flex items-center gap-2 shadow-lg shadow-[rgba(var(--color-accent-rgb),0.2)]"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
        </svg>
        {{ copySuccess ? t('messages.copySuccess', '已複製！') : t('common.copyResult', '複製結果') }}
      </button>
    </div>
  </div>
</header>
