<!-- Header Component (v1.0) -->
<header
  class="bg-theme-elevated/50 backdrop-blur-md border-b border-theme-default h-16 flex items-center px-6 shrink-0 z-20"
>
  <div class="flex items-center gap-3">
    <!-- Mobile Menu Button (v0.8.9) -->
    <button
      @click="mobileSidebarOpen = !mobileSidebarOpen"
      class="md:hidden p-2 -ml-2 text-theme-secondary hover:text-white hover:bg-theme-hover rounded-lg transition-colors"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path v-if="!mobileSidebarOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        <path v-else stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
    <div
      class="w-8 h-8 brand-gradient rounded-lg flex items-center justify-center shadow-lg"
      style="box-shadow: 0 4px 15px -3px rgba(var(--color-primary-rgb), 0.3);"
    >
      <svg
        class="w-5 h-5 text-white"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M13 10V3L4 14h7v7l9-11h-7z"
        ></path>
      </svg>
    </div>
    <h1
      class="text-xl font-bold brand-gradient-text"
    >
      Local Insight
    </h1>
  </div>

  <div class="ml-auto flex items-center gap-4">
    <!-- Search Bar -->
    <div class="relative group">
      <input
        type="text"
        :placeholder="t('notes.searchPlaceholder')"
        v-model="searchKeyword"
        @input="handleSearchInput"
        class="bg-theme-surface/50 border border-theme-default text-sm rounded-full px-4 py-2 pl-10 w-64 focus:outline-none focus:border-theme-primary focus:ring-1 focus:ring-theme-primary transition-all"
      />
      <svg
        class="w-4 h-4 text-theme-muted absolute left-3.5 top-2.5 group-focus-within:text-theme-brand-light transition-colors"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        ></path>
      </svg>
    </div>

    <!-- Quick Prompt Button -->
    <!-- Prompt Builder Link (v0.6) -->
    <a
      href="/prompt-builder"
      class="bg-gradient-to-r from-orange-600 to-amber-500 hover:from-orange-500 hover:to-amber-400 text-white px-4 py-2 rounded-full text-sm font-medium transition-all shadow-lg shadow-orange-600/20 flex items-center gap-2"
      :title="t('promptBuilder.subtitle')"
    >
      <svg
        class="w-4 h-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"
        ></path>
      </svg>
      {{ t('nav.promptBuilder') }}
    </a>

    <!-- Quick Add Button (Purple/Accent) -->
    <button
      @click="openQuickAdd()"
      class="bg-theme-accent hover:bg-theme-accent-hover text-white px-4 py-2 rounded-full text-sm font-medium transition-all shadow-lg shadow-[rgba(var(--color-accent-rgb),0.2)] flex items-center gap-2"
      :title="t('common.quickAdd', '快速新增')"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      {{ t('common.quickAdd', '快速新增') }}
    </button>

    <!-- Add Note Button (Blue/Primary) -->
    <button
      @click="openEditor()"
      class="bg-theme-primary hover:bg-theme-primary-hover text-white px-4 py-2 rounded-full text-sm font-medium transition-all shadow-lg shadow-[rgba(var(--color-primary-rgb),0.2)] flex items-center gap-2"
    >
      <svg
        class="w-4 h-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 4v16m8-8H4"
        ></path>
      </svg>
      {{ t('notes.newNote') }}
    </button>

    <!-- Note Info & Selection Toolbar -->
    <div class="flex items-center gap-3">
      <!-- Current View Title -->
      <div
        class="flex items-center gap-2 px-3 py-1.5 bg-theme-elevated/50 rounded-lg border border-theme-default"
      >
        <span class="text-sm font-medium text-theme-primary"
          >{{ selectedType === 'all' ? t('common.all') : selectedType }}</span
        >
        <span
          class="text-xs text-theme-muted bg-theme-hover px-2 py-0.5 rounded-full"
          >{{ filteredNotes.length }}</span
        >
      </div>

      <!-- Selection Mode Toggle (Updated v0.9.0) -->
      <button
        @click="toggleSelectionMode"
        :class="[
          'px-3 py-1.5 rounded-lg text-sm font-medium transition-all border flex items-center gap-2',
          isSelectionMode 
            ? 'bg-blue-500/20 border-blue-500/50 text-blue-400 hover:bg-blue-500/30' 
            : 'bg-theme-elevated border-theme-default text-theme-secondary hover:text-theme-primary hover:border-theme-hover'
        ]"
        :title="isSelectionMode ? t('common.cancel', '取消') : t('notes.selectionMode', '複選模式')"
      >
        <svg
          class="w-4 h-4"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
          ></path>
        </svg>
        <span class="hidden sm:inline">{{ isSelectionMode ? t('common.cancel', '取消') : t('notes.multiSelect', '複選') }}</span>
      </button>

      <!-- Sort Mode Toggle (v0.9.0) -->
      <div class="flex bg-theme-elevated rounded-lg p-1">
        <button
          @click="toggleSortMode('updated')"
          :class="sortMode === 'updated' ? 'bg-theme-hover text-white' : 'text-theme-secondary hover:text-white hover:bg-theme-hover'"
          class="px-2 py-1 rounded text-xs transition-colors"
          :title="t('sort.updated', '更新時間')"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </button>
        <button
          @click="toggleSortMode('custom')"
          :class="sortMode === 'custom' ? 'bg-theme-hover text-white' : 'text-theme-secondary hover:text-white hover:bg-theme-hover'"
          class="px-2 py-1 rounded text-xs transition-colors"
          :title="t('sort.custom', '自訂排序 (可拖放)')"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path>
          </svg>
        </button>
        <button
          @click="toggleSortMode('created')"
          :class="sortMode === 'created' ? 'bg-theme-hover text-white' : 'text-theme-secondary hover:text-white hover:bg-theme-hover'"
          class="px-2 py-1 rounded text-xs transition-colors"
          :title="t('sort.created', '建立時間')"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
        </button>
      </div>

      <!-- Display Mode Toggles -->
      <div class="flex bg-gray-800 rounded-lg p-1">
        <button
          @click="viewMode = 'grid'"
          :class="viewMode === 'grid' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:text-white hover:bg-gray-700'"
          class="p-1.5 rounded transition-colors"
          title="格狀檢視"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
            ></path>
          </svg>
        </button>
        <button
          @click="viewMode = 'list'"
          :class="viewMode === 'list' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:text-white hover:bg-gray-700'"
          class="p-1.5 rounded transition-colors"
          title="列表檢視"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            ></path>
          </svg>
        </button>
      </div>

      <!-- Pagination Status -->
      <div
        v-if="!notesLoading && filteredNotes.length > 0"
        class="text-xs text-gray-500 px-2"
      >
        {{ t('notes.showing', '已顯示') }} {{ notes.length }}/{{ totalNotes }} {{ t('notes.items', '則') }}
        <span v-if="!hasMore" class="text-blue-400">· {{ t('notes.allLoaded') }}</span>
      </div>
    </div>

    <!-- Language Switcher (v0.8.8) -->
    <div class="relative">
      <button
        @click="langDropdownOpen = !langDropdownOpen"
        class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-700 transition-colors flex items-center gap-1"
        title="語言 / Language"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path>
        </svg>
        <span class="text-xs">{{ currentLocale === 'zh-TW' ? '中' : 'EN' }}</span>
      </button>
      <!-- Language Dropdown -->
      <div
        v-if="langDropdownOpen"
        @click.stop
        class="absolute right-0 top-full mt-1 bg-gray-800 border border-gray-700 rounded-lg shadow-xl z-50 min-w-32 overflow-hidden"
      >
        <button
          v-for="locale in availableLocales"
          :key="locale"
          @click="setLocale(locale); langDropdownOpen = false"
          class="w-full px-4 py-2 text-left text-sm transition-colors flex items-center gap-2"
          :class="currentLocale === locale ? 'bg-blue-600/20 text-blue-400' : 'text-gray-200 hover:bg-gray-700'"
        >
          <span v-if="currentLocale === locale">✓</span>
          <span v-else class="w-3"></span>
          {{ getLocaleName(locale) }}
        </button>
      </div>
    </div>

    <!-- Settings Button -->
    <button
      @click="isSettingsOpen = true; catLoadList()"
      class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-700 transition-colors"
      title="設定與備份"
    >
      <svg
        class="w-5 h-5"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
        ></path>
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
        ></path>
      </svg>
    </button>
  </div>
</header>
